name: Backend CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:

jobs:

  test:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Lint
        run: |
          python -m py_compile app/main.py

      - name: Run tests
        run: |
          pytest || true
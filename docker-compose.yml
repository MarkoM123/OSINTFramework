services:

  postgres:
    image: postgres:17

    container_name: osint-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: osintdb
      POSTGRES_USER: osint
      POSTGRES_PASSWORD: SameRendomShitt123.

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: osint-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

volumes:
  postgres_data:
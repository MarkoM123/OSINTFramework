services:

  postgres:
    image: postgres:17
    container_name: osint-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: osintdb
      POSTGRES_USER: osint
      POSTGRES_PASSWORD: SameRendomShitt123.

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: osint-redis
    restart: unless-stopped

    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend

    container_name: osint-backend
    restart: unless-stopped

    environment:
      database_url: postgresql://osint:SameRendomShitt123.@postgres:5432/osintdb
      redis_url: redis://redis:6379/0

    ports:
      - "8000:8000"

    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./backend

    container_name: osint-worker
    restart: unless-stopped

    environment:
      database_url: postgresql://osint:SameRendomShitt123.@postgres:5432/osintdb
      redis_url: redis://redis:6379/0

    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info

    depends_on:
      - postgres
      - redis

volumes:
  postgres_data: